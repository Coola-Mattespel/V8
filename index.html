<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laddar…</title>
  </head>
  <body>
    <p>Laddar sidan…</p>

    <script>
      ;(async () => {
        const REMOTE_INDEX_URL =
          'https://raw.githubusercontent.com/Coola-Mattespel/Coola-Mattespel-V4-TESTSIDA.github.io/main/index.html'

        // Behåll lokala bildfiler så de fungerar som i nuvarande repo.
        const localImages = new Set(['favicon.png', 'refresh-icon.png', 'setting.png', 'Main.svg'])

        const toLocalIfAvailable = url => {
          try {
            const u = new URL(url, REMOTE_INDEX_URL)
            const file = u.pathname.split('/').pop()
            return localImages.has(file) ? file : url
          } catch {
            return url
          }
        }

        try {
          const response = await fetch(REMOTE_INDEX_URL, { cache: 'no-store' })
          if (!response.ok) throw new Error(`Kunde inte hämta index.html (${response.status})`)

          const html = await response.text()
          const parser = new DOMParser()
          const doc = parser.parseFromString(html, 'text/html')

          doc.querySelectorAll('img[src]').forEach(el => {
            el.setAttribute('src', toLocalIfAvailable(el.getAttribute('src') || ''))
          })

          doc.querySelectorAll('link[rel*="icon"][href]').forEach(el => {
            el.setAttribute('href', toLocalIfAvailable(el.getAttribute('href') || ''))
          })

          document.open()
          document.write('<!doctype html>\n' + doc.documentElement.outerHTML)
          document.close()
        } catch (error) {
          document.body.innerHTML =
            '<h1>Kunde inte ladda sidan</h1><p>Fel vid hämtning av extern index.html.</p><pre>' +
            String(error) +
            '</pre>'
          console.error(error)
        }
      })()
    </script>
  </body>
</html>
